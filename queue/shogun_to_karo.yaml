  command: |
    MADBデータセットの分析と統合方針策定。

    ## 背景
    殿がフォーク済み: https://github.com/ayubon2/dataset
    上流: https://github.com/mediaarts-db/dataset
    MADBはこのプロジェクトのデータの背骨（manga_code）。公式データセットをJSON-LDで入手可能になった。

    ## 作業内容

    ### Phase 1: リポジトリクローン＆データ解凍
    1. `gh repo clone ayubon2/dataset /Users/nobi/projects/010_multi-agent-shogun/projects/madb-dataset`
    2. 漫画関連ファイルを解凍:
       - data/json-ld/metadata_cm-item_cm101_json.zip（単巻）
       - data/json-ld/metadata_cm-col_cm104_json.zip（単巻シリーズ）
       - data/json-ld/metadata_cm-col_cm107_json.zip（作品）※あれば
       - data/json-ld/metadata_cm-item_cm102_json.zip（雑誌号）
       - data/json-ld/metadata_cm-item_cm103_json.zip（その他）

    ### Phase 2: データ構造分析
    1. 各カテゴリのJSONスキーマ（フィールド一覧）を抽出
    2. レコード数をカウント
    3. manga_code の形式を確認（既存DBと一致するか）
    4. ISBN がどのフィールドにあるか特定
    5. タイトル、著者、出版社、出版日、巻数などの項目マッピング
    6. サンプルとして有名作品（ONE PIECE, 鬼滅の刃等）のデータを抽出して内容確認

    ### Phase 3: 既存DBとの差分分析
    1. manga_v2.db の works テーブルスキーマと比較
    2. MADBにあって手元にないフィールド（活用候補）
    3. 手元にあってMADBにないデータ（BookWalkerカバー、AniListスコア等）
    4. manga_code の一致率を概算

    ### Phase 4: 統合方針案の策定
    1. 差分を埋める具体的な手順案
    2. データ鮮度の制限（~2024年）と補完ソースの提案
    3. 定期更新の仕組み（upstream sync）
    4. 結果を context/design/madb_dataset.md に記載

    ## 注意
