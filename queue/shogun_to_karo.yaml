      favorites: number[],     // 好き（従来のfavorites）
      passed: number[],        // パス（従来のpassed）
      read: number[],          // 既読（従来のreadingStatus completedから移行）
      ratingCount: number
    }
    ```

    **後方互換**: 既存localStorageの favorites/passed は維持。manga_dna/read を追加。
    既存のreadingStatus hookとの整合性も確認すること。

