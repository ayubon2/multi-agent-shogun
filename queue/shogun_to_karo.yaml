commands:
- id: cmd_033
  timestamp: '2026-02-26T23:30:00+09:00'
  north_star: 『何を作るか』を決めずに作り続けても迷子になる。全軍が同じゴールを見て走るための羅針盤を作れ
  purpose: 009のビジョン・ローンチ計画・機能ロードマップが、将軍/家老/軍師の三者議論を経て一枚の戦略文書にまとまる
  acceptance_criteria:
  - context/vision_009.md が作成され、以下が全て含まれている
  - 1. サイトのアイデンティティ（何者で、誰のためで、何が唯一無二か）
  - '2. ローンチ要件（MVP定義: これが揃ったら公開する、の最小セット）'
  - 3. ユーザー登録・認証の設計方針（いつ、どの方式で、何が登録で可能になるか）
  - 4. フェーズ別ロードマップ（Pre-Launch → Launch → Post-Launch）
  - 5. 各フェーズの具体的な機能リストと優先順位
  - 6. ローンチ先（どこで告知し、最初のユーザーをどう獲得するか）
  - 7. 成功指標（何をもって成功とするか）
  - 軍師のreport YAMLに戦略分析が含まれている
  - 家老のreport YAMLに実現可能性・工数見積もりが含まれている
  - 将軍所見が文書に統合されている
  - 殿に提出可能な状態（ダッシュボード🚨要対応に掲載）
  command: "【最重要】殿からの叱責を受けての議論セッション002。\ncmd_031/032は並行で進めてよいが、本cmdが全ての上位に立つ。\n\n\
    殿の指摘（原文要約）:\n「家老と軍師と将軍で議論して、もっと深掘りしてよ。\n この漫画サイト、どこを目指していくのか。\n どこでローンチして、その後どういう機能拡張するのか。\n\
    \ ユーザごとに漫画を紹介するって言って、ユーザ登録の仕組みもないじゃん？」\n\n== 議論の構造 ==\n\nPhase 1: 軍師が戦略分析を提出（report\
    \ YAML）\n  以下の問いに答えよ:\n  Q1. 009は何者か？ 一言で言え。（「〇〇のための〇〇サイト」）\n  Q2. 競合と比較して、009でしかできないことは何か？（Deep\
    \ Research参照）\n  Q3. 最初のユーザーは誰か？（ペルソナ: 年齢、漫画歴、何を求めてくるか）\n  Q4. ユーザーが「また来たい」と思う理由は何か？\n\
    \  Q5. ユーザー登録で何が変わるべきか？（登録前/後の体験の違い）\n  Q6. MVPに含めるべき機能と、含めないべき機能の線引き\n  Q7. ローンチ先の候補と各チャネルの特性\n\
    \  Q8. 成功の定義（1ヶ月後、3ヶ月後、1年後）\n\nPhase 2: 家老が実現可能性を評価（report YAML）\n  軍師の戦略分析を受けて:\n\
    \  - 各機能の工数見積もり\n  - ユーザー認証の技術選定（Auth.js? Clerk? Supabase Auth?）\n  - ローンチまでに必要な技術的タスク一覧\n\
    \  - 現状の009から何を削り、何を追加すべきか\n  - リスク（法的、技術的、運用的）\n\nPhase 3: 将軍が統合し vision_009.md\
    \ を完成\n  軍師と家老の分析を統合し、殿に提出可能な文書にまとめる。\n\n== 議論で考慮すべき材料 ==\n\n1. Deep Research（context/gemini_deep_research_manga_platform.md）\n\
    \   - 市場: 6,703億円、推奨の質がリテンション核心\n   - 競合: alu.jp, Bangumi, Sprout, Teemii, Mantium\n\
    \   - 技術: LLMセマンティック検索、グラフ埋め込み、OpenBD\n   - 法的: 書影利用、ABJマーク、ネタバレ判決\n\n2. 議論001の未解決問い\n\
    \   - 「118Kは量の武器か質の負債か」\n   - 「城は建った、民はまだ来ておらぬ」\n   - OpenBD統合の優先度\n\n3. 殿のこれまでの方針（Memory\
    \ MCP）\n   - ディスク内=ground truth\n   - 情報源の明示を重視\n   - 定期収集パイプライン構築を重視\n   - API追加より人間判断の蓄積を優先\n\
    \n4. 現在の矛盾\n   - パーソナライズを語るがユーザー登録なし\n   - GA4もなくユーザー行動が見えない\n   - 118K作品があるがスコアは3%のみ\n\
    \   - デザインが洗練されていない\n\n== 成果物 ==\ncontext/vision_009.md に以下を含める:\n1. ビジョンステートメント（1文）\n\
    2. ターゲットユーザー（ペルソナ）\n3. 競合ポジショニング\n4. MVP定義（ローンチに必須の機能リスト）\n5. ユーザー認証設計\n6. フェーズ別ロードマップ\n\
    7. ローンチ計画（告知チャネル、初期ユーザー獲得戦略）\n8. 成功指標\n9. リスクと対策\n\n== 殿の生フィードバック（最重要。議論の出発点にせよ）\
    \ ==\n\n殿が実際にサイトを触って感じたこと:\n\n「操作感がとても悪い。直感的じゃない。」\n\n具体的指摘:\na) ライブサーチがない。検索窓に打ったら候補がリアルタイムで出るべき\n\
    b) 条件を絞っても対象数が動的に変わらない（ファセット検索の欠如）\nc) Enterを押さないと反映しない箇所がある。即時反映すべき\nd) alu.jpの「5つの好きな漫画を登録して」フローがわかりやすかった\n\
    \   → 検索→候補表示→選択。これがUXの手本\ne) UXの最大化が全く考えられていない\n\n殿の要求（構造的）:\n- 類似サイトをソースコードレベルで分析せよ\n\
    - UXパターン・機能・導線・便利機能をデータベースに蓄積せよ\n- 採用できる仕組みをどんどん採用せよ\n\n→ これは「見た目を良くする」話ではない。\n\
    \  「ユーザーが迷わず、気持ちよく漫画を発見できる体験」を\n  競合サイトから学び、体系的に009に組み込む話。\n\n殿の追加構想（2026-02-26\
    \ 23:40）:\nf) Deep Researchで出てきたファイル名解析ツール（Aniparse等）のような\n   漫画関連の便利機能・API・サイト・データを徹底的に網羅せよ。\n\
    g) 漫画関連リソースを徹底網羅し、内部資産として蓄積する。\n   → 外部に「ハブです」と公開するわけではない。\n   → 集めた情報は009改善の内部資産。表に出すのは結果。\n\
    \   → 必要なら008（プライベート側）で管理画面的に閲覧できればよい。\nh) 漫画エコシステム全体のカタログ化:\n   - 名前解析ツール（Aniparse,\
    \ filename-parser, StashApp Parser）\n   - 書誌API（OpenBD, Google Books, Amazon PA-API,\
    \ 楽天）\n   - スコア/メタデータDB（AniList, MAL, MangaDex, Kitsu, Bangumi）\n   - 公的データ（文化庁MADB）\n\
    \   - 自己ホスト型ツール（Komga, Teemii, Mantium, KamiYomu, Mokuro Reader）\n   - AI/OCR（Manga\
    \ OCR, Sprout, AniBrainAI）\n   - ニュースソース（コミックナタリー, Wikipedia）\n\n殿の追加指示（2026-02-26\
    \ 23:45）:\ni) 最新のWeb技術をしっかり採用せよ（Next.js最新機能、React Server Components、\n   Streaming\
    \ SSR、Edge Runtime、View Transitions API等）\nj) セキュリティもしっかりやれ（OWASP Top 10対策、CSP、認証/認可の堅牢化）\n\
    k) 足軽が複数いるのだから、これらは並行で進めよ。\n   → デザイン改善/UX改善/データ収集/セキュリティ/技術刷新を同時に回せ。\n\n殿の核心的指摘（2026-02-26\
    \ 23:50 — これが最上位原則）:\n「結局はWebサイトなんだから、UXが悪かったら、操作性が悪かったら、\n 定着しないよ。便利でも。」\n\n\
    → 全議論・全設計・全実装において、UXを最上位の判断基準とせよ。\n  機能の上にUXを乗せるのではなく、UXの上に機能を乗せよ。\n  「この機能は便利か？」ではなく「この機能は気持ちよく使えるか？」で判断せよ。\n\
    \n殿の構想（外部サービス連携）:\ns) 読んだ漫画を手入力させるのはUXが最悪。\n   AniList/MAL等のアカウント連携で読了リストを一括インポートできるようにせよ。\n\
    \   → 初回ユーザーの入口を2つ用意:\n     ① AniList/MAL連携 → OAuth → 一括インポート → 即パーソナライズ\n   \
    \  ② 手動で5作品選ぶ（alu.jp方式） → ライトに始める\n   → 手入力を強いないこと自体がUXの差別化。\n   → AniList OAuth、MAL\
    \ OAuth の仕様を調査し、実装設計に含めよ。\n\n殿のフィードバック追加（レーダーチャート）:\nl) レーダーチャートに違和感がある。納得感がない。\n\
    \   → 6軸の選定根拠、スコア算出ロジック、表示方法を再検討せよ。\n   → 「なぜこの軸か」「なぜこのスコアか」がユーザーに伝わる設計にせよ。\n\
    \   → 軸の数・名前・算出方法を含め、ゼロベースで見直してよい。\n   → ruijianime.comやSproutの類似度表現方法も参考に。\n\
    \   → 今すぐ直さなくてよいが、議論で扱え。\n\n殿の指摘（データ品質）:\nn) データが増えればゴミ情報も増える。AniListの外国漫画（manhwa/manhua/海外コミック）が\n\
    \   日本漫画DBに混入するのが典型例。\n   → 「何を取り込まないか」のフィルタリングルールを設計に含めよ。\n   → データ品質管理: 入れるもの/弾くものの基準を明確にせよ。\n\
    \n殿の方針確定（最重要）:\no) 009は日本漫画に特化する。これはブレない軸。\n   → manhwa/manhua/海外コミックは対象外。\n \
    \  → 外部データ取り込み時は「日本漫画か否か」のフィルタを必ずかけよ。\n   → ビジョンステートメントに「日本漫画特化」を明記せよ。\n\np) 成人漫画・同人誌も対象。排除しない。\n\
    \   → 日本の漫画文化として尊重する。殿の明確な意思。\n   → ただし公開サイトではゾーニング（年齢確認・フィルタ切替）が必要。\n   → AdSense等の収益化手段は成人コンテンツ制約があるため、その影響も議論に含めよ。\n\
    \nq) ゾーニング方式: デフォルトはセーフモード（成人・同人は非表示）。\n   ユーザーが明示的にチェックを入れれば表示される。ペアレンタルコントロール的な設計。\n\
    \   → 検索結果にも一覧にもデフォルトでは出てこない。\n   → 設定画面 or プロフィールで切替。\n   → これはユーザー登録なしでもcookie/localStorageで対応可能。\n\
    \n殿の構想（原作・コミカライズ連携）:\nr) 異世界系を中心に、ラノベ/Web小説（カクヨム、なろう）→ コミカライズの流れが加速。\n   009はこの「上流」も視野に入れる:\n\
    \   - 「この漫画の原作小説はこれ」→ 原作への導線\n   - 「原作を読もう！」特集ページ\n   - 「この小説、そろそろ漫画になるかも」→ コミカライズ予測\n\
    \   - 殿自身がラノベ→漫画化を何作も見てきた実体験あり\n   → データソースとして「小説家になろう」「カクヨム」のAPI/データも調査対象に追加。\n\
    \   → 漫画だけでなく、その原作まで含めた「日本のストーリーコンテンツのハブ」に発展する可能性。\n\n殿の参考サイト追加（2026-02-26 23:55）:\n\
    m) http://ruijianime.com/comic/ — 類似検索の参考。\n   このサイトの類似検索の仕組み・UX・導線をソースコードレベルで分析せよ。\n\
    \   009の類似検索（レーダー/タグベース）の改善に直結する。\n"
- id: cmd_046
  timestamp: '2026-02-28T09:45:00+09:00'
  north_star: publicとprivateを統一UIで運用し、殿が一つの操作体系で漫画コレクション全体を管理できるようにする。publicの発見体験をprivateの所有管理にシームレスにつなげる
  purpose: 009(public)のデザイン・UIコンポーネントをベースに、008(private)にprivateレイヤーを重ねる統合設計を策定・実装する
  acceptance_criteria:
  - 軍師による統合設計書が完成している（UIコンポーネント共有方式、データフロー、認証レイヤー）
  - 008が009のUIデザイン（テーマ、コンポーネント、レイアウト）を共有している
  - privateレイヤー機能（所有状況表示、検証UI、DLリンク等）が008に追加されている
  - manga.perory.com でpublic同等のUIに加えprivate機能が使える
  - publicデータ（レコメンド、タグ、スコア）をprivateから参照できる
  command: "008/009 UI統合作戦 — publicデザインベース + privateレイヤー。\n\n殿の方針:\n- 009(public discover.perory.com)のデザイン・UIをベースに\n\
    - 008(private manga.perory.com)にprivate機能をレイヤーとして重ねる\n- できるだけ同じUIを使いたい\n- 難しければ最低限:\
    \ レコメンドなどの処理元データだけpublicから引っ張る\n\n設計フェーズ（軍師）:\n1. 現状分析: 008と009の技術スタック・コンポーネント・データソースの差分調査\n\
    2. 統合方式の選定:\n   - A案: 共有UIライブラリ（packages/ui）を作り両方から参照\n   - B案: 009のコードを008にコピー＋private拡張\n\
    \   - C案: monorepo化（turborepo等）\n   - D案: 008から009のAPIを叩いてデータだけ取得（UI独立）\n3. privateレイヤー設計:\
    \ 所有フラグ表示、検証UIリンク、DLリンク、ファイル管理機能\n4. データフロー: discover.db → manga_v2.db の参照関係\n\
    \n技術コンテキスト:\n- 008: Next.js 15 + shadcn/ui, localhost:3000, manga.perory.com,\
    \ CF Access認証\n- 009: Next.js 15 + shadcn/ui, localhost:3002, discover.perory.com,\
    \ 公開\n- 両方ともshadcn/ui使用 → コンポーネント互換性高い\n- 008にはcmd_041の検証UIが既に実装済み\n\nまず軍師に設計レビューさせ、方式選定後に実装に入れ。\n"
  project: manga_ecosystem
  priority: high
  status: design_complete_v2
  design_v2_completed_at: '2026-02-28T11:58:00'
  design_v2_note: 方式C（Turborepo monorepo）設計書完成。5層セキュリティ分離。2.5-3週間・ピーク足軽3名。殿の承認待ち。context/sakusen_046_design.md
