- id: cmd_024
  timestamp: '2026-02-25T09:15:00+09:00'
  purpose: 漫画情報の定期収集・分析パイプラインの設計が完成し、レコメンド観点の網羅的リストが策定される
  acceptance_criteria:
  - レコメンドに活用可能な観点が最低30個以上リストアップされている
  - 各観点に対する情報ソース（API/RSS/スクレイピング/手動）が特定されている
  - 定期収集パイプラインのアーキテクチャ設計図がある
  - 過去データの遡及収集計画がある
  - 新刊情報・メディア化・受賞等のリアルタイム収集方式が設計されている
  - 収集データ → レコメンドへの変換ロジック（どう推薦に活かすか）が説明されている
  - 提案書がダッシュボード🚨要対応に上がっている
  command: "殿からの直接指示（最重要構想）:\n「漫画情報を定期的に収集して行く仕組みづくりが必要。新刊情報やニュースを\n収集し続けることで、そこを起点としたレコメンドもある。映画になった、とか。\n\
    過去についても調べる必要がある。レコメンドするべき観点をできるだけ多く上げて、\n必要な情報を定期的に収集、分析する仕組みを作る必要がある。」\n\n==\
    \ これは漫画エコシステムの中核インフラである ==\n\n単なるデータ収集ではない。「何を理由に漫画をレコメンドするか」の\n観点を網羅的に洗い出し、それぞれに必要な情報を継続的に集める\n\
    パイプラインを設計する。\n\n== Phase 1: レコメンド観点の網羅的洗い出し ==\n\n以下は出発点。軍師・忍びで徹底的に拡張せよ。\n\n【イベント起点のレコメンド】\n\
    - 「この作品が映画化/実写化された」→ 原作レコメンド\n- 「この作品がアニメ化された/新シーズン発表」→ 原作レコメンド\n- 「この作者の新作が出た」→\
    \ 過去作レコメンド\n- 「この作品が受賞した」→ 受賞作レコメンド\n- 「この作品が完結した」→ まとめ読みレコメンド\n- 「このジャンルが今話題」→\
    \ トレンドレコメンド\n\n【属性起点のレコメンド】\n- 同じ作者の他作品\n- 同じ雑誌/レーベルの作品\n- 同じタグ/ジャンルの作品\n- 類似レーダーチャートの作品（既存）\n\
    - 同じ時代の作品\n- 同じ出版社の作品\n\n【評価起点のレコメンド】\n- 高評価作品（MAL, AniList, BookWalker）\n- 発行部数ランキング上位\n\
    - 受賞歴のある作品\n- 「このマンガがすごい!」ランクイン\n\n【ユーザー起点のレコメンド】（将来）\n- 閲覧履歴ベース\n- お気に入りリストベース\n\
    - 「この作品を読んだ人はこれも読んでいる」\n\n【季節/文脈起点のレコメンド】\n- 夏に読みたい漫画、冬に読みたい漫画\n- 旅行先の舞台の漫画\n\
    - 映画公開に合わせた原作\n- 記念日（作品連載開始○周年）\n\n== Phase 2: 情報ソースの特定と収集方式設計 ==\n\n各観点に対し:\n\
    1. どこから情報を得るか（API, RSS, スクレイピング, 手動）\n2. 収集頻度（リアルタイム, 日次, 週次, 月次）\n3. データ格納方式（既存DBへの追加テーブル\
    \ or 新DB）\n4. 過去データの遡及方法\n\n情報ソース候補:\n- メディア芸術データベース（文化庁）\n- AniList API / MAL\
    \ API\n- 出版科学研究所\n- natalie.mu（漫画ニュース）\n- コミックナタリー RSS\n- Amazon Product API\n\
    - Wikipedia API\n- BookWalker\n- 各出版社の新刊情報ページ\n- X(Twitter) トレンド\n\n== Phase 3:\
    \ パイプラインアーキテクチャ設計 ==\n\ncronジョブ or launchd で定期実行する収集・分析パイプライン:\n```\n収集 → パース\
    \ → 正規化 → DB格納 → 分析 → レコメンド生成\n```\n\n== 進め方 ==\n1. 軍師: 全体設計・レコメンド観点の構造化\n2. 忍び:\
    \ 外部情報ソースの網羅的調査（API有無、RSS有無、スクレイピング可否）\n3. 足軽: 設計書作成・提案書整理\n4. 提案書をダッシュボード\U0001F6A8\
    要対応に上げ、殿に提出\n\n== 注意 ==\n- cmd_021（コンテンツ戦略）と連携するが、本cmdはより広い\n  「情報収集インフラ」の設計に焦点を置く\n\
    - 実装は次フェーズ。今回は設計と提案まで\n\n対象リポ:\n  ~/projects/002_manga-system\n  ~/projects/009_manga-discover\n"
  project: manga_ecosystem
  priority: critical
  status: complete
  completed_at: '2026-02-25T20:00:00+09:00'
  completion_note: 設計書sakusen_024_pipeline.md完成。レコメンド観点37件・情報ソース特定・パイプラインアーキテクチャ設計完了。実装は後続cmdへ。
