- id: cmd_074
  type: data_quality_verification
  title: 巻数データ全件検証 + 曖昧フラグ導入
  description: |
    殿の指摘: 進撃の巨人が2巻表示（正しくは34巻）。NARUTOも20巻（正しくは72巻）。
    データ品質に重大な問題がある。

    ## Phase 1: 即時修正（足軽1名）
    進撃の巨人(id=77346): total_volumes=34
    NARUTO(id=77361): total_volumes=72
    呪術廻戦(id=77350): total_volumes=27 (status=FINISHEDも)
    DB: ~/projects/009_manga-discover/data/db/discover.db

    ## Phase 2: DB拡張 — 曖昧フラグ（足軽1名）
    worksテーブルに以下カラム追加:
    - data_confidence TEXT DEFAULT 'unverified'
      -- 値: 'verified'(殿確認済), 'auto_verified'(自動検証合格), 'suspicious'(要確認), 'unverified'(未検証)
    - volume_source TEXT DEFAULT ''
      -- 巻数の情報元: 'anilist', 'mal', 'books_or_jp', 'manual', etc.
    - verified_at TIMESTAMP
    - verified_by TEXT  -- 'lord', 'auto_qc', etc.

    ## Phase 3: 自動検証ロジック（gunshi設計 → 足軽実装）
    人気作品（anilist_popularity > 10000）の巻数を外部ソース（AniList API, books.or.jp等）と照合。
    不一致があれば data_confidence = 'suspicious' にマーク。
    一致すれば data_confidence = 'auto_verified'。

    ## Phase 4: 全件バッチ検証
    Batch Processing Protocol 準拠。batch1でQC → 全件実行。
    対象: anilist_popularity > 10000 の作品（推定2000-3000件）から開始。

    ## 検証ルール
    - AniList APIで取得した volumes と比較
    - 差分 > 20% かつ AniList値 > 5 なら suspicious
    - AniList値がNULLの場合、books.or.jpフォールバック
    - 巻数が1または2で、anilist_popularityが高い（>50000）作品は自動suspicious

