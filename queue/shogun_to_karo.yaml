    殿承認済み。Gemini提案を評価・取捨選択した結果、以下を実装する。

    ### 1. 4方向評価システム（現行3軸→4軸）

    現行: 💚推し(F) / ❌パス(X) / 📖既読(R)
    新規: 🧬神DNA(W/上) / ❤️好き(D/右) / 🚫パス(A/左) / 📥既読(S/下)

    #### キーボード操作
    - W/↑: 神（漫画DNA殿堂入り）— カードが上に光りながら吸い込まれる
    - D/→: 好き/読みたい — カードが右にスライドして消える
    - A/←: パス/非表示 — カードが左にフェードアウト
    - S/↓: 既読/保留 — カードが下にスタックされる

    #### モバイル操作
    - 上スワイプ: 神
    - 右スワイプ: 好き
    - 左スワイプ: パス
    - 下スワイプ: 既読

