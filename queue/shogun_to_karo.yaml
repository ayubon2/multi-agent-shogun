- id: cmd_076
  type: tag_system_implementation
  title: メインタグ/サブタグ2層構造の実装
  description: |
    設計書: context/design/tag_system.md（確定済み）
    殿指示: 大きなタグとバックグラウンドのタグ構造を実装せよ。

    ## 設計概要（tag_system.md参照）
    - メインタグ（3-5個/作品）: ユーザーに表示。検索・フィルタ・作品ページで使用
    - サブタグ（10-20個/作品）: 非表示。類似度計算・レコメンドエンジン用

    ## Phase 1: DBスキーマ（足軽1名）
    discover.db に以下テーブル追加:
    ```sql
    CREATE TABLE tags (
      id INTEGER PRIMARY KEY,
      name TEXT NOT NULL UNIQUE,      -- 日本語タグ名
      layer TEXT NOT NULL,             -- ジャンル/舞台/設定/テーマ/職業/関係性/キャラ属性/生物/読み味/表現形式
      anilist_mapping TEXT DEFAULT '', -- 対応するAniListタグ（カンマ区切り）
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE work_tags (
      work_id INTEGER NOT NULL,
      tag_id INTEGER NOT NULL,
      tag_type TEXT NOT NULL CHECK(tag_type IN ('main', 'sub')),
      source TEXT DEFAULT '',          -- bookwalker/anilist_map/llm/manual
      confidence REAL DEFAULT 0.5,     -- 0.0-1.0
      PRIMARY KEY (work_id, tag_id),
      FOREIGN KEY (work_id) REFERENCES works(id),
      FOREIGN KEY (tag_id) REFERENCES tags(id)
    );
    ```

    ## Phase 2: タグマスター投入（足軽1名）
    tag_system.md の10層・約225タグをtagsテーブルに投入。
    既存のAniList→日本語マッピング（155/387完了分）を反映。

    ## Phase 3: 既存タグの移行（足軽1名）
    現在worksテーブルにあるタグデータをwork_tagsに移行。
    - 現在の英語タグ → 日本語マッピング → main/sub分類
    - BookWalkerから取得済みのジャンル情報 → メインタグ
    - AniListタグ → サブタグ（マッピング経由）

    ## Phase 4: UI反映（足軽1名）
    - 作品ページ: メインタグのみ表示（クリックで絞り込み）
    - 絞り込みUI: メインタグのみ選択可能
    - サブタグはAPIレスポンスに含めるがUI非表示
    - 全タグ日本語で表示（tag_system.md の方針）

    ## Phase 5: タグパイプライン（自動更新）
    - 日次: BookWalkerジャンル → メインタグ
    - 週次: AniListマッピング → Wikipedia → LLMサブタグ推定
    - 月次: トレンドレビュー、低使用タグ統合

