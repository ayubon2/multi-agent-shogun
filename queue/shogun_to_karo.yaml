    \ 'unverified'\n  -- 値: 'verified'(殿確認済), 'auto_verified'(自動検証合格), 'suspicious'(要確認),\
    \ 'unverified'(未検証)\n- volume_source TEXT DEFAULT ''\n  -- 巻数の情報元: 'anilist',\
    \ 'mal', 'books_or_jp', 'manual', etc.\n- verified_at TIMESTAMP\n- verified_by\
