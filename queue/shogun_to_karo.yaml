    == 方針 ==

    現行 /ja のページ構成（ポータル型トップ+各探索ページ）は維持。

    デザインの洗練度を上げる。「やぼったい」を「洗練された」に変える。

    これは1回で完成ではなく、継続的に改善していくイテレーション。


    == Phase 1: 競合分析（軍師 + 足軽で分担） ==

    以下の競合サイトを実際にアクセスし、構成・デザイン・UXを分析:


    【必須分析対象】

    1. alu.jp — 国内先行メディア。コマ投稿、ABJマーク、LINE連携

    2. AniList (anilist.co) — ミニマルグリッド、スコア表示、プロフィール

    3. BookWalker (bookwalker.jp) — バッジシステム、カテゴリナビ

    4. anime.ameo.dev (Sprout) — 2Dアトラス可視化、ニューラルレコメンド

    5. natalie.mu/comic — ニュースレイアウト、画像の使い方


    【追加参考（余力があれば）】

    6. mangadex.org — フィルタリングUI、多言語対応

    7. piccoma.com — モジュールスタッキング、モバイルファースト

    8. syo-ei.com — カード余白感、清潔感

    9. gcs-tc-school.com — 明るいオレンジ系色味


    各サイトについて:

    - トップページの構成（何をどう並べているか）

    - ナビゲーション設計

    - カードUIのデザイン（余白、角丸、影、ホバーエフェクト）

    - 色の使い方（背景、アクセント、テキスト）

    - フォントの雰囲気

    - 「洗練されている」と感じるポイントは何か


    == Phase 2: やぼったさの原因特定と改善 ==

    現行009のどこがやぼったいかを具体的に列挙し、改善:


    考えられる原因（仮説）:

    - 余白が足りない or 多すぎる

    - フォントが汎用的すぎる（デフォルトsans-serif感）

    - カードの影・角丸・ホバーが標準shadcn/uiのまま

    - 色の使い方がフラット（グラデーション・アクセントが弱い）

    - アニメーション・トランジションがない

    - 画像がない（テキストだけの寂しさ） ← OpenBD統合で解消予定

    - アイコン・イラストの不足


    改善は小さな単位で実装し、殿に都度確認してもらう。

    一気にやって殿の好みと違ったら手戻りが大きい。


    == Phase 3: 繰り返し改善 ==

    殿のフィードバックを受けて修正 → 再提出 → 修正のサイクル。

    このcmdは「1回目の提案と実装」までがスコープ。


