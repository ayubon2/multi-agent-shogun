messages:
- content: '【殿令】即時停止命令 — テスト実行禁止


    全ashigaru・軍師へ周知せよ：


    1. 現在実行中のvitest/テストをすべて即座に中止せよ

    2. 今後、将軍の明示的な指示なしにテストを実行するな


    理由：現フェーズは「構築フェーズ」である。テスト実行はCPUリソースを大量消費し、マシン全体のパフォーマンスを著しく低下させている（Load Average
    126超、vitest workerが20プロセス以上暴走）。


    構築フェーズでの行動指針：

    - コードの実装・ビルドに集中せよ

    - テストは書いてもよいが「実行するな」

    - テスト実行は将軍がフェーズ移行を宣言してから行え


    以上。殿からの直接命令である。家老経由で全エージェントに即時伝達せよ。'
  from: lord
  id: msg_20260316_004730_bcd31a4e
  read: true
  timestamp: '2026-03-16T00:47:30'
  type: lord_directive
